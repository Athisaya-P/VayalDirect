    function applyLocalBuyerLoginTranslation(lang) {
      const translations = buyerLoginTranslations[lang] || buyerLoginTranslations.en;
      Object.entries(translations).forEach(([key, value]) => {
        const el = document.getElementById(key);
        if (!el) return;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.placeholder = value;
        } else {
          el.textContent = value;
        }
      });
      document.documentElement.lang = lang;
    }

    function updateBuyerLoginPlaceholders(lang) {
      const translations = buyerLoginTranslations[lang] || buyerLoginTranslations.en;
      const placeholderMap = {
        existingName: 'Enter your Name',
        existingPhone: '98765 43210',
        existingOtpInput: '123456',
        newName: 'e.g. Priya Sharma',
        newEmail: 'priya.buyer@gmail.com',
        newPhone: '98765 43210',
        newOtpInput: '123456'
      };
      Object.entries(placeholderMap).forEach(([id, fallback]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.placeholder = translations[id] || fallback;
      });
    }

    function setBuyerLoginLanguage(lang) {
      applyLocalBuyerLoginTranslation(lang);
      updateBuyerLoginPlaceholders(lang);
    }

    function normalizePhone(phone) {
      if (!phone) return '';
      const cleaned = phone.toString().replace(/\D/g, '');
      if (cleaned.length === 10) {
        return '+91' + cleaned;
      }
      if (cleaned.length === 12 && cleaned.startsWith('91')) {
        return '+' + cleaned;
      }
      return '';
    }

    function isValidTenDigitPhone(phone) {
      return !!phone && phone.replace(/\D/g, '').length === 10;
    }

    function clearInvalidBuyerSession() {
      const current = localStorage.getItem('currentBuyerPhone') || localStorage.getItem('buyerPhone');
      if (!current) return;
      if (!isValidTenDigitPhone(current)) {
        localStorage.removeItem('currentBuyerPhone');
        localStorage.removeItem('buyerPhone');
        Object.keys(localStorage).forEach(key => {
          if (key.startsWith('buyerData_')) {
            try {
              const stored = JSON.parse(localStorage.getItem(key));
              if (!stored || !isValidTenDigitPhone(stored.phone)) {
                localStorage.removeItem(key);
              }
            } catch (e) {
              localStorage.removeItem(key);
            }
          }
        });
      }
    }

        newForm.classList.add('hidden');
        existingTab.classList.add('tab-active');
        newTab.classList.remove('tab-active');
      } else if (tab === 1) {
        existingForm.classList.add('hidden');
        newForm.classList.remove('hidden');
        existingTab.classList.remove('tab-active');
        newTab.classList.add('tab-active');
      }

      document.getElementById('existingMessage').classList.add('hidden');
      document.getElementById('newMessage').classList.add('hidden');
      document.getElementById('existingOtpSection').classList.add('hidden');
      document.getElementById('newOtpSection').classList.add('hidden');
    }

    // Handle Existing User Login
    async function handleExistingLogin() {
      let phone = document.getElementById('existingPhone').value.trim();
      const messageEl = document.getElementById('existingMessage');

      phone = normalizePhone(phone);
      if (!phone) {
        messageEl.textContent = "Please enter a valid 10-digit mobile number";
        messageEl.classList.remove('hidden');
        return;
      }

      const registeredBuyers = JSON.parse(localStorage.getItem('vayalRegisteredBuyers')) || {};
      const localExists = !!registeredBuyers[phone];

      let serverExists = false;
      try {
        const respLogin = await fetch(`${apiBase}/api/buyer/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        serverExists = respLogin.ok;
      } catch (err) {
        console.warn('Server login unavailable, using local fallback:', err.message);
      }

      if (!serverExists && !localExists) {
        messageEl.textContent = "No account found with this number. Please register as a new buyer.";
        messageEl.classList.remove('hidden');
        return;
      }

      // Send OTP either way.
      try {
        const resp = await fetch(`${apiBase}/api/buyer/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, registerMode: false })
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          const errorMessage = data.error || 'Unable to send OTP right now. Please try again.';
          if (!localExists) {
            messageEl.textContent = errorMessage;
            messageEl.classList.remove('hidden');
            return;
          }
          console.warn('Backend send-otp returned error, using local OTP fallback:', errorMessage);
          messageEl.textContent = 'OTP service unavailable, please use demo OTP 123456.';
          messageEl.classList.remove('hidden');
        }
      } catch (err) {
        console.warn('Backend send-otp failed:', err.message);
        if (!localExists) {
          messageEl.textContent = 'Unable to send OTP right now. Please try again.';
          messageEl.classList.remove('hidden');
          return;
        }
        messageEl.textContent = 'OTP service unavailable, please use demo OTP 123456.';
        messageEl.classList.remove('hidden');
      }

      document.getElementById('existingOtpSection').classList.remove('hidden');
      alert("✅ OTP Sent! (Demo: Use 123456)");
    }

    // Handle New Buyer Registration
    async function handleNewBuyerRegister() {
      let phone = document.getElementById('newPhone').value.trim();
      const name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const messageEl = document.getElementById('newMessage');

      if (!phone || !name || !email) {
        messageEl.textContent = "Please fill all fields";
        messageEl.classList.remove('hidden');
        return;
      }

      phone = normalizePhone(phone);
      if (!phone) {
        messageEl.textContent = "Please enter a valid 10-digit mobile number";
        messageEl.classList.remove('hidden');
        return;
      }

      const registeredBuyers = JSON.parse(localStorage.getItem('vayalRegisteredBuyers')) || {};
      if (registeredBuyers[phone]) {
        messageEl.textContent = "This number is already registered. Please login as existing buyer.";
        messageEl.classList.remove('hidden');
        switchBuyerTab(0);
        return;
      }

      try {
        const resp = await fetch(`${apiBase}/api/buyer/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        if (resp.ok) {
          messageEl.textContent = "This number is already registered. Please login as existing buyer.";
          messageEl.classList.remove('hidden');
          switchBuyerTab(0);
          return;
        }
      } catch (err) {
        console.warn('Server login unavailable, proceeding with registration flow:', err.message);
      }

      const respSend = await fetch(`${apiBase}/api/buyer/send-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, registerMode: true })
      });

      if (!respSend.ok) {
        const data = await respSend.json().catch(() => ({}));
        const errorMessage = data.error || 'Unable to send OTP';
        if (respSend.status === 409) {
          messageEl.textContent = errorMessage;
          messageEl.classList.remove('hidden');
          return;
        }
        console.warn('Backend send-otp failed for registration, using demo fallback:', errorMessage);
        document.getElementById('newOtpSection').classList.remove('hidden');
        messageEl.textContent = 'OTP service unavailable, please use demo OTP 123456.';
        messageEl.classList.remove('hidden');
        return;
      }

      document.getElementById('newOtpSection').classList.remove('hidden');
      messageEl.classList.add('hidden');
      alert("✅ OTP Sent! (Demo: Use 123456)");
    }

    // Verify OTP
    async function verifyBuyerOTP(isNewUser) {
      const messageEl = document.getElementById(isNewUser ? 'newMessage' : 'existingMessage');
      const otp = document.getElementById(isNewUser ? 'newOtpInput' : 'existingOtpInput').value.trim();

      if (otp !== "123456") {
        alert("❌ Wrong OTP. Use 123456 for demo.");
        return;
      }

      let phone = isNewUser ?
        document.getElementById('newPhone').value.trim() :
        document.getElementById('existingPhone').value.trim();
      phone = normalizePhone(phone);

      let name = 'Buyer';
      let email = '';
      const registeredBuyers = JSON.parse(localStorage.getItem('vayalRegisteredBuyers')) || {};
      if (isNewUser) {
        name = document.getElementById('newName').value.trim() || 'New Buyer';
        email = document.getElementById('newEmail').value.trim();
        if (!email) {
          alert("Please enter your email address.");
          return;
        }
      } else {
        // existing buyer should use stored data if possible
        if (registeredBuyers[phone]) {
          name = registeredBuyers[phone].name || name;
          email = registeredBuyers[phone].email || '';
        }
      }

      let buyerData = null;

      try {
        const resp = await fetch(`${apiBase}/api/buyer/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code: otp, registerMode: isNewUser, name, email })
        });

        const result = await resp.json();
        if (resp.ok && result.buyer) {
          buyerData = result.buyer;
        } else {
          if (!isNewUser && resp.status === 404) {
            messageEl.textContent = 'No buyer found. Please register as a new buyer.';
            messageEl.classList.remove('hidden');
            return;
          }
          if (isNewUser && resp.status === 409) {
            messageEl.textContent = 'Buyer already exists. Please login as existing buyer.';
            messageEl.classList.remove('hidden');
            return;
          }
          messageEl.textContent = result.error || 'OTP verification failed.';
          messageEl.classList.remove('hidden');
          return;
        }
      } catch (err) {
        console.warn('Backend verify-otp unavailable, local fallback:', err.message);
      }

      const registeredBuyersFinal = JSON.parse(localStorage.getItem('vayalRegisteredBuyers')) || {};

      if (!buyerData) {
        if (registeredBuyersFinal[phone]) {
          buyerData = registeredBuyersFinal[phone];
        } else if (isNewUser) {
          buyerData = {
            uid: 'local-' + phone.replace(/\D/g, ''),
            name,
            phone,
            email,
            totalSpent: 0,
            ordersCount: 0,
            orderHistory: [],
            joined: new Date().toISOString()
          };
        } else {
          messageEl.textContent = 'No buyer found; please register first.';
          messageEl.classList.remove('hidden');
          // leave on existing tab to avoid sudden navigation jumps.
          return;
        }
      }

      buyerData.uid = buyerData.uid || ('local-' + phone.replace(/\D/g, ''));
      registeredBuyersFinal[phone] = buyerData;
      localStorage.setItem('vayalRegisteredBuyers', JSON.stringify(registeredBuyersFinal));

      // IMPORTANT: Store phone BEFORE redirect
      localStorage.setItem('buyerPhone', phone);
      localStorage.setItem('currentBuyerPhone', phone);
      localStorage.setItem('buyerData_' + buyerData.uid, JSON.stringify(buyerData));

      if (isNewUser) {
        // Redirect immediately for new users
        window.location.href = 'buyer-onboarding.html';
      } else {
        alert(`🎉 Welcome, ${buyerData.name}!`);
        window.location.href = "buyer.html";
      }
    }

    // Initialize
    function getInitialBuyerTab() {
      const params = new URLSearchParams(window.location.search);
      return params.get('tab') === 'register' ? 1 : 0;
    }

    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'ta,hi,te,bn,ml',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }

    function toggleGTPanel() {
      document.getElementById('gt-panel')?.classList.toggle('hidden');
    }

    function setTranslationPreference(lang) {
      if (lang === 'en') {
        localStorage.removeItem('selectedTranslationLanguage');
        document.cookie = 'googtrans=/en/en; path=/';
      } else {
        localStorage.setItem('selectedTranslationLanguage', lang);
        document.cookie = `googtrans=/en/${lang}; path=/`;
      }
    }

    function restoreTranslationFromStorage() {
      const lang = localStorage.getItem('selectedTranslationLanguage') || 'en';
      if (lang === 'en') {
        document.cookie = 'googtrans=/en/en; path=/';
      } else {
        document.cookie = `googtrans=/en/${lang}; path=/`;
      }
      return lang;
    }

    function applyGoogleTranslate(lang) {
      document.getElementById('gt-panel')?.classList.add('hidden');
      setTranslationPreference(lang);
      if (lang === 'en') {
        setBuyerLoginLanguage('en');
      } else {
        setBuyerLoginLanguage(lang);
      }

      const googleReady = typeof google !== 'undefined' && google.translate && google.translate.TranslateElement;
      if (googleReady) {
        location.reload();
      }
    }

    function initializeLanguageSelector() {
      const selector = document.getElementById('languageSelect');
      const wrapper = document.getElementById('gt-wrapper');
      if (!selector || !wrapper) return;
      selector.addEventListener('change', (e) => {
        if (e.target.value === 'google') {
          wrapper.classList.remove('hidden');
        } else {
          wrapper.classList.add('hidden');
        }
      });
      const mode = localStorage.getItem('selectedTranslationLanguage') && localStorage.getItem('selectedTranslationLanguage') !== 'en'
        ? 'google'
        : 'en';
      selector.value = mode;
      if (mode === 'google') {
        wrapper.classList.remove('hidden');
      } else {
        wrapper.classList.add('hidden');
      }
    }

    window.onload = () => {
      clearInvalidBuyerSession();
      switchBuyerTab(getInitialBuyerTab());
      restoreTranslationFromStorage();
      initializeLanguageSelector();
      const script = document.createElement('script');
      script.src = "https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
      document.head.appendChild(script);
      setBuyerLoginLanguage('en');
    };
  </script>
  <div id="google_translate_element" class="hidden"></div>
</body>
